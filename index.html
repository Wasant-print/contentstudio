  :root{
    --navy:#10262B;
    --navy-light:#193C43;
    --sand:#EFE7D8;
    --sand-dark:#E2D6BE;
    --mango:#F2A93B;
    --mango-dark:#D6910F;
    --teal:#1F6F78;
    --stamp:#C1443C;
    --ink:#152024;
    --white:#FBF8F2;
    --green:#3F7A56;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--sand);
    color:var(--ink);
    font-family:'DB Heavent','IBM Plex Sans Thai',sans-serif;
    min-height:100vh;
  }
  .app{}

  /* ===== Shell layout ===== */
  .shell{display:flex;align-items:stretch;min-height:100vh;}

  /* ===== Sidebar ===== */
  .sidebar{
    width:236px;flex:none;
    background:var(--navy);color:var(--white);
    padding:20px 16px;
    display:flex;flex-direction:column;gap:20px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
    border-right:1px solid var(--ink);
  }
  .sidebar-brand{position:relative;overflow:hidden;padding-bottom:6px;}
  .sidebar-brand .tag{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;
    color:var(--mango);text-transform:uppercase;display:block;margin-bottom:4px;
  }
  .sidebar-brand h1{
    font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:24px;
    letter-spacing:.02em;margin:0 0 8px;line-height:1;
  }
  .sidebar-brand .route{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--sand);opacity:.85;
  }
  .sidebar-nav{display:flex;flex-direction:column;gap:6px;}
  .sidebar-item{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:8px;
    background:transparent;border:none;color:var(--sand);
    font-family:'DB Heavent','IBM Plex Sans Thai',sans-serif;font-size:14px;font-weight:600;
    cursor:pointer;text-align:left;width:100%;position:relative;
    transition:background .12s ease;
  }
  .sidebar-item:hover{background:var(--navy-light);}
  .sidebar-item.active{background:var(--mango);color:var(--ink);}
  .sidebar-icon{flex:none;width:20px;display:flex;align-items:center;justify-content:center;}
  .sidebar-footer{margin-top:auto;border-top:1px solid var(--navy-light);padding-top:14px;}
  .ping{
    position:absolute;right:10px;top:10px;width:8px;height:8px;border-radius:50%;
    background:var(--mango);
  }

  /* ===== Main content ===== */
  .main{flex:1;min-width:0;padding:20px 26px 60px;max-width:1080px;}
  .topbar{display:none;align-items:center;gap:12px;margin-bottom:14px;}
  .topbar-brand{
    font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:18px;color:var(--navy);
  }
  .hamburger{
    background:var(--navy);color:var(--white);border:none;
    width:38px;height:38px;border-radius:8px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex:none;
  }
  .scrim{display:none;}

  @media(max-width:900px){
    .sidebar{
      position:fixed;left:0;top:0;height:100vh;width:250px;
      transform:translateX(-104%);transition:transform .25s ease;z-index:60;
      box-shadow:6px 0 24px rgba(0,0,0,.35);
    }
    .sidebar.open{transform:translateX(0);}
    .topbar{display:flex;}
    .main{padding:14px 14px 60px;}
    .scrim{
      display:none;position:fixed;inset:0;background:rgba(16,38,43,.55);z-index:55;
    }
    .scrim.show{display:block;}
  }

  .panel{
    background:var(--white);
    border:1px solid var(--ink);
    border-radius:14px;
    padding:20px;
    margin-top:16px;
  }
  .panel h2{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:800;
    font-size:22px;
    margin:0 0 4px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel .sub{
    font-size:13px;
    color:#5c6b6d;
    margin-bottom:16px;
  }

  button.primary{
    background:var(--mango);
    border:1px solid var(--ink);
    color:var(--ink);
    font-weight:700;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-family:'DB Heavent','IBM Plex Sans Thai',sans-serif;
    font-size:14px;
  }
  button.primary:hover{background:var(--mango-dark);}
  button.primary:disabled{opacity:.5;cursor:wait;}
  button.ghost{
    background:transparent;
    border:1px solid var(--ink);
    color:var(--ink);
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-family:'DB Heavent','IBM Plex Sans Thai',sans-serif;
    font-size:13px;
  }
  button.danger{
    background:transparent;
    border:1px solid var(--stamp);
    color:var(--stamp);
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
  }
  input[type=text], input[type=date], textarea, select{
    width:100%;
    font-family:'DB Heavent','IBM Plex Sans Thai',sans-serif;
    font-size:14px;
    padding:9px 10px;
    border:1px solid #b9b2a2;
    border-radius:8px;
    background:var(--sand);
    color:var(--ink);
  }
  textarea{resize:vertical;min-height:80px;}
  label{font-size:12px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row > .field{flex:1;min-width:160px;}

  /* ===== Calendar ===== */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-nav .month-label{
    font-family:'Big Shoulders Display',sans-serif;
    font-size:24px;font-weight:800;color:var(--navy);
  }
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{
    text-align:center;font-size:11px;font-weight:700;color:var(--teal);
    font-family:'IBM Plex Mono',monospace;text-transform:uppercase;padding:4px 0;
  }
  .cal-day{
    background:var(--sand);

<script>
/* ============== STORAGE HELPERS (browser localStorage — works on self-hosted GitHub Pages) ============== */
async function safeGet(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}
async function safeSet(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch(e){ console.error('storage set failed', e); return false; }
}

/* ============== TOAST ============== */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ============== GEMINI (GOOGLE AI STUDIO) API HELPER ============== */
async function geminiRequest(body){
  const apiKey = state.googleApiKey;
  if(!apiKey){
    throw new Error('ยังไม่ได้ใส่ Google API Key — ใส่ในช่อง "ตั้งค่า Google API Key" ด้านบนก่อนนะครับ');
  }
  const model = "gemini-2.5-flash";
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;

  const maxAttempts = 3;
  let lastErr = null;
  for(let attempt=1; attempt<=maxAttempts; attempt++){
    try{
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if(!res.ok){
        const errText = await res.text().catch(()=> '');
        throw new Error(`API ตอบกลับผิดพลาด (สถานะ ${res.status}) ${errText.slice(0,200)}`);
      }
      const data = await res.json();
      if(data.error){
        throw new Error(data.error.message || 'API คืนค่า error');
      }
      const cand = data.candidates && data.candidates[0];
      const text = cand && cand.content && cand.content.parts
        ? cand.content.parts.map(p=>p.text||'').join('\n\n')
        : '';
      return text || "(ไม่ได้รับคำตอบ ลองใหม่อีกครั้ง)";
    }catch(err){
      lastErr = err;
      const isNetworkErr = err.message === 'Failed to fetch' || err instanceof TypeError;
      if(attempt < maxAttempts && isNetworkErr){
        await new Promise(r=>setTimeout(r, 700 * attempt));
        continue;
      }
      break;
    }
  }
  const friendly = (lastErr && lastErr.message === 'Failed to fetch')
    ? 'เชื่อมต่อเครือข่ายไม่สำเร็จหลังลองหลายครั้ง ลองกดปุ่มใหม่อีกทีนะครับ'
    : (lastErr ? lastErr.message : 'เกิดข้อผิดพลาดที่ไม่ทราบสาเหตุ');
  throw new Error(friendly);
}

async function callClaude(systemPrompt, userText, opts={}){
  const parts = [];
  if(opts.images && opts.images.length){
    opts.images.forEach(img=>{
      parts.push({ inline_data: { mime_type: img.mediaType, data: img.data } });
    });
  }
  parts.push({ text: userText });

  const body = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: [{ role: "user", parts }],
    generationConfig: { maxOutputTokens: opts.maxTokens || 1000 }
  };
  if(opts.webSearch){
    body.tools = [{ google_search: {} }];
  }
  return geminiRequest(body);
}

async function callChatAI(systemPrompt, history, opts={}){
  const body = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: history.map(m=>({ role: m.role, parts: [{ text: m.text }] })),
    generationConfig: { maxOutputTokens: opts.maxTokens || 1024 }
  };
  return geminiRequest(body);
}
function tryParseJSON(text){
  let clean = text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  try{ return JSON.parse(clean); }catch(e){ /* fall through to brace extraction */ }
  const start = clean.indexOf('{');
  const end = clean.lastIndexOf('}');
  if(start !== -1 && end !== -1 && end > start){
    const sliced = clean.slice(start, end+1);
    try{ return JSON.parse(sliced); }catch(e){ return null; }
  }
  return null;
}
function parseDataUrl(dataUrl){
  const m = dataUrl.match(/^data:(.+?);base64,(.*)$/);
  if(!m) return null;
  return { mediaType: m[1], data: m[2] };
}
function extractVideoFrames(file, frameCount=6, onProgress){
  return new Promise((resolve, reject)=>{
    const video = document.createElement('video');
    video.preload = 'auto';
    video.muted = true;
    video.style.display = 'none';
    video.src = URL.createObjectURL(file);
    document.body.appendChild(video);

    const cleanup = ()=>{ URL.revokeObjectURL(video.src); video.remove(); };

    video.onloadedmetadata = ()=>{
      const duration = video.duration;
      const canvas = document.createElement('canvas');
      canvas.width = 360;
      const times = [];
      for(let i=0;i<frameCount;i++){ times.push((duration*(i+0.5))/frameCount); }
      let idx = 0;
      const frames = [];
      function next(){
        if(idx >= times.length){ cleanup(); resolve(frames); return; }
        video.currentTime = times[idx];
      }
      video.onseeked = ()=>{
        canvas.height = Math.round(canvas.width * (video.videoHeight/video.videoWidth || 0.5625));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        frames.push({ time: times[idx], dataUrl: canvas.toDataURL('image/jpeg', 0.7) });
        idx++;
        if(onProgress) onProgress(idx, times.length);
        next();
      };
      next();
    };
    video.onerror = ()=>{ cleanup(); reject(new Error('อ่านไฟล์วิดีโอไม่สำเร็จ')); };
  });
}
function fmtTime(sec){
  const m = Math.floor(sec/60), s = Math.round(sec%60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

/* ============== CALENDAR ============== */
const DOW = ['อา','จ','อ','พ','พฤ','ศ','ส'];
const MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

function renderCalendar(){
  const y = state.calYear, m = state.calMonth;
  const firstDow = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);

  let cells = '';
  for(let i=0;i<firstDow;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayItems = state.items.filter(it=>it.date===dateStr);
    const shown = dayItems.slice(0,2);
    const extra = dayItems.length - shown.length;
    cells += `<div class="cal-day ${dateStr===todayStr?'today':''}" data-date="${dateStr}">
      <div class="num">${d}</div>
      ${shown.map(it=>`<div class="stub" data-item="${it.id}"><span class="dot ${it.platform}"></span>${escapeHtml(it.title)}</div>`).join('')}
      ${extra>0 ? `<div class="more-link" data-date="${dateStr}">+${extra} เพิ่มเติม</div>` : ''}
    </div>`;
  }

  return `
    <div class="panel">
      <h2>📋 ปฏิทินคอนเทนต์</h2>
      <div class="sub">วางแผนว่าวันไหนทำอะไร คลิกวันที่เพื่อเพิ่มคอนเทนต์ใหม่</div>
      <div class="cal-nav">
        <button class="ghost" id="prevMonth">← เดือนก่อน</button>
        <div class="month-label">${MONTHS[m]} ${y+543}</div>
        <button class="ghost" id="nextMonth">เดือนถัดไป →</button>
      </div>
      <div class="cal-grid">
        ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
  `;
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function segClass(part){
  const p = (part||'').toLowerCase();
  if(p.includes('hook') || p.includes('ต้น')) return 'start';
  if(p.includes('ท้าย') || p.includes('cta')) return 'end';
  return 'mid';
}
function segmentsToText(segments){
  return (segments||[]).map(s=>`[${s.time}] ${s.part}\nพูด: ${s.voiceover}${s.visual ? '\nภาพ: '+s.visual : ''}`).join('\n\n');
}

async function generateScript(){
  const topic = document.getElementById('scriptTopic').value.trim();
  if(!topic){ toast('ใส่หัวข้อก่อนนะครับ'); return; }
  const duration = parseInt(document.getElementById('scriptDuration').value, 10);
  const goal = document.getElementById('scriptGoal').value;
  const goalLabel = {follow:'ให้ Follow',comment:'ให้ Comment',save:'ให้ Save',watch:'ให้ดูจนจบ'}[goal];

  state.scriptLoading = true; state.scriptResult = null; render();

  const ctaStart = Math.max(duration - Math.round(duration*0.15), duration-8);

  const system = `คุณเป็นผู้ช่วยเขียนสคริปต์คอนเทนต์ท่องเที่ยวสำหรับ TikTok ให้ครีเอเตอร์ชื่อ Babibird
${state.styleBible}

${state.hookFrameworks}

${state.productionNotes}

กำหนดความยาวรวมของคลิป: ${duration} วินาทีพอดี (TikTok เท่านั้น)

ให้แบ่งสคริปต์ออกเป็นช่วงเวลาที่ชัดเจน (segments) ครอบคลุมตั้งแต่ 0:00 ถึง 0:${String(duration).padStart(2,'0')} โดยไม่มีช่วงเวลาขาดหายหรือเกินความยาวที่กำหนด อย่างน้อย 4 ช่วง ตามสัดส่วนนี้:
- ช่วงต้น (Hook): วินาทีที่ 0 ถึงประมาณวินาทีที่ 3
- ช่วงต้น (Setup): ต่อจาก Hook ถึงประมาณ 20-25% ของความยาวคลิป
- ช่วงกลาง (Payoff): ตั้งแต่ท้าย Setup จนถึงประมาณวินาทีที่ ${ctaStart}
- ช่วงท้าย (CTA): ตั้งแต่วินาทีที่ ${ctaStart} ถึงจบคลิปที่วินาทีที่ ${duration}

แต่ละช่วงต้องระบุ:
- time: ช่วงเวลาแบบ "0:00-0:03" (นาที:วินาที)
- part: ระบุว่าเป็น "ช่วงต้น (Hook)", "ช่วงต้น (Setup)", "ช่วงกลาง (Payoff)", หรือ "ช่วงท้าย (CTA)"
- voiceover: บทพูดของผมในช่วงนั้น (ภาษาพูด กระชับ)
- visual: คำแนะนำภาพ/มุมกล้อง/การแตกช็อตในช่วงนั้น

ตอบกลับเป็น JSON เท่านั้น ห้ามมีข้อความอื่นหรือ markdown code fence นอกเหนือจาก JSON โครงสร้างนี้:
{"hooks":[{"type":"ชื่อ framework","text":"ตัวอย่างประโยค hook"}, ... อย่างน้อย 3 แบบ],"segments":[{"time":"0:00-0:03","part":"ช่วงต้น (Hook)","voiceover":"...","visual":"..."}, ...ครบทุกช่วงจนจบคลิป],"cta":"คำแนะนำ CTA พร้อมตัวอย่างประโยค"}`;

  const userMsg = `หัวข้อ: ${topic}
แพลตฟอร์ม: TikTok ความยาว ${duration} วินาที
เป้าหมาย CTA: ${goalLabel}`;

  try{
    const text = await callClaude(system, userMsg, { maxTokens: 4096 });
    const parsed = tryParseJSON(text);
    state.scriptResult = parsed || { raw: text };
  }catch(e){
    state.scriptResult = { raw: 'เกิดข้อผิดพลาด ลองใหม่อีกครั้งครับ: ' + e.message };
  }
  state.scriptLoading = false;
  render();
}

function formatNum(n){ if(n==null||isNaN(n)) return '-'; return Number(n).toLocaleString('en-US'); }

function findCol(headers, keywords){
  const lower = headers.map(h=>h.toLowerCase());
  for(const kw of keywords){
    const idx = lower.findIndex(h=>h.includes(kw));
    if(idx>-1) return headers[idx];
  }
  return null;
}

function handleCsvUpload(file){
  state.csvLoading = true; state.csvFileName = file.name; render();
  Papa.parse(file, {
    header:true,
    skipEmptyLines:true,
    complete: (results)=>{
      state.csvLoading = false;
      const rows = results.data;
      if(!rows.length){ toast('อ่านไฟล์ไม่สำเร็จ หรือไฟล์ว่าง'); render(); return; }
      const headers = results.meta.fields;
      const viewCol = findCol(headers, ['view']);
      const likeCol = findCol(headers, ['like']);
      const commentCol = findCol(headers, ['comment']);
      const shareCol = findCol(headers, ['share']);
      const titleCol = findCol(headers, ['title','video','name','post']);
      const dateCol = findCol(headers, ['date','time','published']);

      const num = v => { const n = parseFloat(String(v).replace(/,/g,'')); return isNaN(n)?0:n; };
      let totalViews=0, totalLikes=0, totalComments=0, totalShares=0;
      const parsedRows = rows.map(r=>({
        title: titleCol ? r[titleCol] : '(ไม่ทราบชื่อ)',
        views: viewCol ? num(r[viewCol]) : 0,
        likes: likeCol ? num(r[likeCol]) : 0,
        comments: commentCol ? num(r[commentCol]) : 0,
        shares: shareCol ? num(r[shareCol]) : 0,
        date: dateCol ? r[dateCol] : null
      }));
      parsedRows.forEach(r=>{ totalViews+=r.views; totalLikes+=r.likes; totalComments+=r.comments; totalShares+=r.shares; });

      const avgViews = rows.length ? Math.round(totalViews/rows.length) : 0;
      const engagementRate = totalViews ? +(( (totalLikes+totalComments+totalShares) / totalViews)*100).toFixed(2) : null;
      const topRows = [...parsedRows].sort((a,b)=>b.views-a.views).slice(0,5);
      const hasDateSeries = !!dateCol;

      state.analytics = {
        rowCount: rows.length, totalViews, avgViews, engagementRate, topRows, hasDateSeries,
        seriesData: hasDateSeries ? parsedRows.filter(r=>r.date).sort((a,b)=>new Date(a.date)-new Date(b.date)) : null
      };
      render();
      if(hasDateSeries){ setTimeout(drawTrendChart, 50); }
      toast('อ่านไฟล์สำเร็จ');
    },
    error: ()=>{ state.csvLoading = false; render(); toast('อ่านไฟล์ไม่สำเร็จ'); }
  });
}

let chartInstance = null;
function drawTrendChart(){
  const canvas = document.getElementById('trendChart');

  await safeSet('chat-history', state.chatMessages);

  const calSummary = state.items.slice(0,8).map(it=>`${it.date} [${statusLabel(it.status)}] ${it.title}`).join('\n') || '(ยังไม่มีคอนเทนต์ในปฏิทิน)';

  const system = `คุณเป็นที่ปรึกษาด้านคอนเทนต์ท่องเที่ยวให้ครีเอเตอร์ TikTok ชื่อ Babibird ช่วยคิดแนวทางช่อง กลยุทธ์คอนเทนต์ วางแผนซีรีส์ และวิธีเขียนสคริปต์
${state.styleBible}

${state.hookFrameworks}

${state.productionNotes}

คอนเทนต์ล่าสุดในปฏิทินของช่อง (ไว้อ้างอิงบริบท ไม่ต้องท่องซ้ำทั้งหมด):
${calSummary}

ตอบเป็นภาษาไทย กระชับ ตรงประเด็น ให้คำแนะนำที่ปฏิบัติได้จริง เหมือนเพื่อนร่วมทีมที่เข้าใจสไตล์ช่องนี้ดี ถ้าคำถามกว้างเกินไป ให้ถามกลับสั้นๆ เพื่อโฟกัสก่อนตอบเต็ม`;

  try{
    const reply = await callChatAI(system, state.chatMessages, { maxTokens: 1200 });
    state.chatMessages.push({ role:'model', text: reply });
  }catch(e){
    state.chatMessages.push({ role:'model', text: 'เกิดข้อผิดพลาด: ' + e.message });
  }
  state.chatLoading = false;
  await safeSet('chat-history', state.chatMessages);
  render();
  scrollChatToBottom();
}
function scrollChatToBottom(){
  setTimeout(()=>{
    const win = document.getElementById('chatWindow');
    if(win) win.scrollTop = win.scrollHeight;
  }, 30);
}


function attachHandlers(){
  const saveApiKeyBtn = document.getElementById('saveApiKey');
  if(saveApiKeyBtn) saveApiKeyBtn.onclick = async ()=>{
    const val = document.getElementById('googleApiKeyInput').value.trim();
    state.googleApiKey = val;
    await safeSet('google-api-key', val);
    toast(val ? 'บันทึก API Key แล้ว' : 'ลบ API Key แล้ว');
    render();
  };

  document.querySelectorAll('.sidebar-item[data-tab]').forEach(btn=>{
    btn.onclick = ()=>{ state.tab = btn.dataset.tab; state.sidebarOpen = false; render(); };
  });
  const toggleSettingsBtn = document.getElementById('toggleSettings');
  if(toggleSettingsBtn) toggleSettingsBtn.onclick = ()=>{ state.settingsOpen = !state.settingsOpen; state.sidebarOpen = false; render(); };
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  if(hamburgerBtn) hamburgerBtn.onclick = ()=>{ state.sidebarOpen = !state.sidebarOpen; render(); };
  const scrim = document.getElementById('scrim');
  if(scrim) scrim.onclick = ()=>{ state.sidebarOpen = false; render(); };

  // Calendar
  const prevM = document.getElementById('prevMonth');
  const nextM = document.getElementById('nextMonth');
  if(prevM) prevM.onclick = ()=>{ state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} render(); };
  if(nextM) nextM.onclick = ()=>{ state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} render(); };

  document.querySelectorAll('.cal-day[data-date]').forEach(cell=>{
    cell.addEventListener('click', (e)=>{
      if(e.target.closest('.stub') || e.target.closest('.more-link')) return;
      state.modal = { type:'edit', date: cell.dataset.date };
      render();
    });
  });
  document.querySelectorAll('.stub[data-item]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation();
      const item = state.items.find(it=>it.id===el.dataset.item);
      state.modal = { type:'edit', item };
      render();
    };
  });
  document.querySelectorAll('.more-link[data-date]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation();
      state.modal = { type:'daylist', date: el.dataset.date };
      render();
    };
  });

  // Modal
  const closeBtn = document.getElementById('closeModal');
  if(closeBtn) closeBtn.onclick = ()=>{ state.modal=null; render(); };
  const overlay = document.getElementById('overlay');
  if(overlay) overlay.addEventListener('click', (e)=>{ if(e.target.id==='overlay'){ state.modal=null; render(); } });

  const addNewForDay = document.getElementById('addNewForDay');
  if(addNewForDay) addNewForDay.onclick = ()=>{ state.modal = { type:'edit', date: state.modal.date }; render(); };

  document.querySelectorAll('[data-edit]').forEach(el=>{
    el.onclick = ()=>{ const item = state.items.find(it=>it.id===el.dataset.edit); state.modal = { type:'edit', item }; render(); };
  });

  const saveBtn = document.getElementById('saveItem');
  if(saveBtn) saveBtn.onclick = async ()=>{
    const title = document.getElementById('f-title').value.trim();
    if(!title){ toast('ใส่ชื่อคลิปก่อนนะครับ'); return; }
    const existing = state.modal.item;
    const newItem = {
      id: existing ? existing.id : uid(),
      date: document.getElementById('f-date').value,
      platform: document.getElementById('f-platform').value,
      title,
      status: document.getElementById('f-status').value,
      hook: document.getElementById('f-hook').value,
      cta: document.getElementById('f-cta').value,
      notes: document.getElementById('f-notes').value
    };
    if(existing){
      state.items = state.items.map(it=>it.id===existing.id?newItem:it);
    }else{
      state.items.push(newItem);
    }
    await safeSet('content-items', state.items);
    state.modal = null;
    render();
    toast('บันทึกแล้ว');
  };
  const delBtn = document.getElementById('deleteItem');
  if(delBtn) delBtn.onclick = async ()=>{
    state.items = state.items.filter(it=>it.id!==state.modal.item.id);
    await safeSet('content-items', state.items);
    state.modal = null;
    render();
    toast('ลบแล้ว');
  };

  // Style bible
  const saveBible = document.getElementById('saveBible');
  if(saveBible) saveBible.onclick = async ()=>{
    state.styleBible = document.getElementById('styleBibleInput').value;
    state.hookFrameworks = document.getElementById('hookFrameworksInput').value;
    state.productionNotes = document.getElementById('productionNotesInput').value;
    await safeSet('style-bible', state.styleBible);
    await safeSet('hook-frameworks', state.hookFrameworks);
    await safeSet('production-notes', state.productionNotes);
    toast('บันทึก Style Bible แล้ว');
  };

  // Script generator
  const genBtn = document.getElementById('generateScript');
  if(genBtn) genBtn.onclick = generateScript;
  const saveScriptToCal = document.getElementById('saveScriptToCal');
  if(saveScriptToCal) saveScriptToCal.onclick = async ()=>{
    const r = state.scriptResult;
    const item = {
      id: uid(), date: new Date().toISOString().slice(0,10), platform:'tiktok',
      title: document.getElementById('scriptTopic') ? document.getElementById('scriptTopic').value.trim() || 'คอนเทนต์ใหม่' : 'คอนเทนต์ใหม่',
      status:'writing', hook: r.hooks && r.hooks[0] ? r.hooks[0].text : '', cta: r.cta || '', notes: segmentsToText(r.segments)
    };
    state.items.push(item);
    await safeSet('content-items', state.items);
    toast('บันทึกลงปฏิทินแล้ว');
  };

  // Trend
  const csvFile = document.getElementById('csvFile');
  const onCsvFiles = (files)=>{ if(files[0]) handleCsvUpload(files[0]); };
  if(csvFile) csvFile.onchange = (e)=> onCsvFiles(e.target.files);
  wireDropzone('csvDropzone', onCsvFiles);
  const removeCsvBtn = document.getElementById('removeCsv');
  if(removeCsvBtn) removeCsvBtn.onclick = ()=>{
    state.analytics = null; state.csvFileName = null;
    if(chartInstance){ chartInstance.destroy(); chartInstance = null; }
    render();
  };

  const trendImgFile = document.getElementById('trendImgFile');
  const onTrendImgFiles = (files)=>{
    Array.from(files||[]).forEach(file=>{
      const reader = new FileReader();
      reader.onload = ()=>{ state.trendImages.push(reader.result); render(); };
      reader.readAsDataURL(file);
    });
  };
  if(trendImgFile) trendImgFile.onchange = (e)=> onTrendImgFiles(e.target.files);
  wireDropzone('imgDropzone', onTrendImgFiles);
  document.querySelectorAll('[data-remove-trend-img]').forEach(btn=>{
    btn.onclick = ()=>{ state.trendImages.splice(parseInt(btn.dataset.removeTrendImg,10),1); render(); };
  });
  const runTrend = document.getElementById('runTrendAI');
  if(runTrend) runTrend.onclick = runTrendAI;
  if(state.analytics && state.analytics.hasDateSeries) setTimeout(drawTrendChart, 50);

  // Critique
  const clipVideoFile = document.getElementById('clipVideoFile');
  const onVideoFile = async (files)=>{
    const file = files[0];
    if(!file) return;
    state.critiqueExtracting = true; state.critiqueExtractProgress = 0;
    state.critiqueFrames = []; state.critiqueVideoName = file.name; render();
    try{
      const frames = await extractVideoFrames(file, 6, (done,total)=>{
        state.critiqueExtractProgress = Math.round(done/total*100);
        render();
      });
      state.critiqueFrames = frames;
    }catch(err){
      toast('แกะเฟรมจากวิดีโอไม่สำเร็จ: ' + err.message);
    }
    state.critiqueExtracting = false;
    render();
  };
  if(clipVideoFile) clipVideoFile.onchange = (e)=> onVideoFile(e.target.files);
  wireDropzone('videoDropzone', onVideoFile);
  const removeVideoBtn = document.getElementById('removeVideo');
  if(removeVideoBtn) removeVideoBtn.onclick = ()=>{
    state.critiqueFrames = []; state.critiqueVideoName = null; state.critiqueExtractProgress = 0;
    render();
  };
  const runCrit = document.getElementById('runCritique');
  if(runCrit) runCrit.onclick = runCritique;

  // Chat
  const chatInput = document.getElementById('chatInput');
  const sendChatBtn = document.getElementById('sendChat');
  if(sendChatBtn) sendChatBtn.onclick = ()=>{
    if(chatInput){ sendChatMessage(chatInput.value); chatInput.value=''; }
  };
  if(chatInput){
    chatInput.onkeydown = (e)=>{
      if(e.key==='Enter' && !e.shiftKey){
        e.preventDefault();
        sendChatMessage(chatInput.value);
        chatInput.value='';
      }
    };
  }
  document.querySelectorAll('[data-starter]').forEach(btn=>{
    btn.onclick = ()=> sendChatMessage(btn.dataset.starter);
  });
  const clearChatBtn = document.getElementById('clearChat');
  if(clearChatBtn) clearChatBtn.onclick = async ()=>{
    state.chatMessages = [];
    await safeSet('chat-history', []);
    render();
  };
  scrollChatToBottom();
}

function wireDropzone(dropzoneId, onFiles){
  const dz = document.getElementById(dropzoneId);
  if(!dz) return;
  const input = dz.querySelector('input[type=file]');
  dz.onclick = ()=>{ if(input) input.click(); };
  dz.ondragover = (e)=>{ e.preventDefault(); dz.classList.add('dragover'); };
  dz.ondragleave = ()=>{ dz.classList.remove('dragover'); };
  dz.ondrop = (e)=>{
    e.preventDefault(); dz.classList.remove('dragover');
    if(e.dataTransfer.files && e.dataTransfer.files.length){ onFiles(e.dataTransfer.files); }
  };
}


loadState();
</script>
